<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Approval Prediction</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>
    <form action="/result" method="POST">

        <div class="row g-4">

            <!-- Gender -->
            <div class="col-md-4">
                <div class="form-floating">
                    <select class="form-select shadow-sm" name="gender" required>
                        <option value="">Select Gender</option>
                        <option value="1">Male</option>
                        <option value="0">Female</option>
                    </select>
                    <label>Gender</label>
                </div>
            </div>

            <!-- Own Car -->
            <div class="col-md-4">
                <div class="form-floating">
                    <select class="form-select shadow-sm" name="own_car" required>
                        <option value="">Select</option>
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                    <label>Own Car</label>
                </div>
            </div>

            <!-- Own Realty -->
            <div class="col-md-4">
                <div class="form-floating">
                    <select class="form-select shadow-sm" name="own_realty" required>
                        <option value="">Select</option>
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                    <label>Own Realty</label>
                </div>
            </div>

            <!-- Annual Income -->
            <div class="col-md-4">
                <div class="form-floating">
                    <input type="number" class="form-control shadow-sm" name="income" min="0" step="1"
                        placeholder="Annual Income" required>
                    <label>Annual Income</label>
                </div>
            </div>

            <!-- Children -->
            <div class="col-md-4">
                <div class="form-floating">
                    <input type="number" class="form-control shadow-sm" name="children" min="0" step="1"
                        placeholder="Children" required>
                    <label>Number of Children</label>
                </div>
            </div>

            <!-- Family Members -->
            <div class="col-md-4">
                <div class="form-floating">
                    <input type="number" class="form-control shadow-sm" name="family_members" min="1" step="0.1"
                        placeholder="Family Members" required>
                    <label>Family Members</label>
                </div>
            </div>

            <!-- Income Type -->
            <div class="col-md-4">
                <div class="form-floating">
                    <select class="form-select shadow-sm" name="income_type" required>
                        <option value="">Select</option>
                        <option value="4">Working</option>
                        <option value="0">Commercial Associate</option>
                        <option value="2">State Servant</option>
                        <option value="1">Pensioner</option>
                        <option value="3">Student</option>
                    </select>
                    <label>Income Type</label>
                </div>
            </div>

            <!-- Education -->
            <div class="col-md-4">
                <div class="form-floating">
                    <select class="form-select shadow-sm" name="education" required>
                        <option value="">Select</option>
                        <option value="1">Higher Education</option>
                        <option value="4">Secondary / Secondary Special</option>
                        <option value="2">Incomplete Higher</option>
                        <option value="3">Lower Secondary</option>
                        <option value="0">Academic Degree</option>
                    </select>
                    <label>Education</label>
                </div>
            </div>

            <!-- Family Status -->
            <div class="col-md-4">
                <div class="form-floating">
                    <select class="form-select shadow-sm" name="family_status" required>
                        <option value="">Select</option>
                        <option value="1">Married</option>
                        <option value="3">Single / Not Married</option>
                        <option value="0">Civil Marriage</option>
                        <option value="2">Separated</option>
                        <option value="4">Widow</option>
                    </select>
                    <label>Family Status</label>
                </div>
            </div>

            <!-- Housing Type -->
            <div class="col-md-4">
                <div class="form-floating">
                    <select class="form-select shadow-sm" name="housing_type" required>
                        <option value="">Select</option>
                        <option value="0">House / Apartment</option>
                        <option value="1">With Parents</option>
                        <option value="2">Municipal Apartment</option>
                        <option value="3">Rented Apartment</option>
                        <option value="4">Office Apartment</option>
                        <option value="5">Co-op Apartment</option>
                    </select>
                    <label>Housing Type</label>
                </div>
            </div>

            <div class="col-md-4">
                <div class="form-floating">

                    <select class="form-select shadow-sm" name="occupation" required>

                        <option value="">Select Occupation</option>

                        <option value="0">Accountants</option>
                        <option value="1">Cleaning Staff</option>
                        <option value="2">Cooking Staff</option>
                        <option value="3">Core Staff</option>
                        <option value="4">Drivers</option>
                        <option value="5">HR Staff</option>
                        <option value="6">High Skill Tech Staff</option>
                        <option value="7">IT Staff</option>
                        <option value="8">Laborers</option>
                        <option value="9">Managers</option>
                        <option value="10">Medicine Staff</option>
                        <option value="11">Private Service Staff</option>
                        <option value="12">Realty Agents</option>
                        <option value="13">Sales Staff</option>
                        <option value="14">Secretaries</option>
                        <option value="15">Security Staff</option>
                        <option value="16">Waiters/Barmen Staff</option>
                        <option value="17">Others</option>

                    </select>

                    <label>Occupation</label>

                </div>
            </div>
            <!--Age-->
            <div class="col-md-4">
                <div class="form-floating">

                    <input type="number" class="form-control shadow-sm" name="age" min="18" max="100" placeholder="Age"
                        required>

                    <label>Age (in years)</label>

                </div>
            </div>

            <!--work experience-->
            <div class="col-md-4">
                <div class="form-floating">

                    <input type="number" class="form-control shadow-sm" name="experience" min="0" max="60"
                        placeholder="Experience" required>

                    <label>Work experience (in years)</label>

                </div>
            </div>


            <!-- Credit Window -->
            <div class="col-md-6">
                <div class="form-floating">
                    <input type="number" class="form-control shadow-sm" name="window" min="0"
                        placeholder="Credit Window" required>
                    <label>Credit History Window</label>
                </div>
            </div>

        </div>

        <div class="text-center mt-5">

            <button type="submit" class="btn btn-primary btn-lg px-5 py-3 rounded-pill shadow">

                <i class="fa-solid fa-magnifying-glass-chart me-2"></i>

                Predict Credit Approval

            </button>

        </div>

    </form>

</body>

</html>
